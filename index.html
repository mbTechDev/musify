<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="./style.css" />
  <link rel="stylesheet" href="./resposive.css" />
  <link rel="icon" href="./icons8-musi-120.png" type="image/icon" />
  <title>mb Tech - Musify</title>
</head>
<body>

  <img id="logo" style="position: absolute; bottom: 15px; right: 15px;" src="./logo.jpg" alt="Logo" />
  <ul id="favMusicList" style="padding: 0 15px;"></ul>

  <ul id="nav">
    <li id="allMusics">All Musics</li>
    <li id="favoriteMusics">Favorite</li>
    <li id="menu"><ion-icon name="options"></ion-icon></li>
  </ul>

  <div id="error"></div>

  <div class="wrapper">

    <div id="songPlayers">

      <div class="stickySearchBar">
        <input id="searchBar" type="search" autocomplete="off" placeholder="Search Music..." />
        <button type="submit" id="search">
          <ion-icon name="search-outline"></ion-icon>
        </button>
        <button id="closeMenu">
          <ion-icon name="remove-circle"></ion-icon>
        </button>
      </div>

      <h5 id="navHeader" style="margin-bottom: 15px; margin-left: 17px;">
        <ion-icon name="musical-notes"></ion-icon> All Musics
      </h5>

      <div id="message">
        <img width="150px" src="./sadFace.png" alt="">
        <h3>Sorry! <br> You have no musics</h3>
      </div>

      <ul id="musicList" style="padding: 0 15px;"></ul>
    </div>

    <div>
      <div id="player"></div>

      <div class="musicBoxCentering" style="position: absolute; top: 50%; left: 60%; transform: translate(-50%, -50%);">
        <div>

          <div style="margin-left: 35px; text-align: center;" id="headPhone">
            <img width="200px" src="./headphone.png" alt="">
            <br> <br>
            <h2 style="font-family: cursive; color: #585858;">Hear What You Love</h2>
          </div>

          <div id="musicBox">
            <div id="box"></div>

            <div id="overlay">
              <div>
                <img src="./wave.gif" alt="">
                <div
                  style="
                    position: absolute;
                    top: 150px;
                    left: 0;
                    width: 94%;
                    padding: 0 10px;
                  "
                >
                  <input type="range" id="musicSlider" value="0" />
                </div>
              </div>
            </div>

            <div style="padding: 12px;">
              <div class="playOptions">
                <button id="favorite" class="favorite">
                  <ion-icon name="heart-outline"></ion-icon>
                </button>
                <button id="previous">
                  <ion-icon name="play-skip-back-sharp"></ion-icon>
                </button>
                <button id="playOrPause">
                  <ion-icon name="play-circle"></ion-icon>
                </button>
                <button id="next">
                  <ion-icon name="play-skip-forward-sharp"></ion-icon>
                </button>
                <button id="loop">
                  <ion-icon name="infinite-outline"></ion-icon>
                </button>
              </div>

              <div class="volumeBar">
                <button id="muteOrUnmute" style="margin-right: 8px;">
                  <ion-icon name="volume-high"></ion-icon>
                </button>
                <input
                  type="range"
                  value="50"
                  onchange="player.setVolume(this.value)"
                />
              </div>
            </div>
          </div>

        </div>
      </div>
    </div>

  </div>

  <!-- Ionicons -->
  <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
  <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>

  <!-- YouTube IFrame API -->
  <script src="https://www.youtube.com/iframe_api"></script>

  <!-- Your Script -->
  <script src="./script.js"></script>

</body>
</html>
